<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d">
  <title id="t">Subtle hero texture</title>
  <desc id="d">Low-contrast geometric texture for the page header background.</desc>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f4fa8" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#0f4fa8" stop-opacity="0.02"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#0f4fa8" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="420" fill="url(#fade)"/>
  <rect width="1600" height="420" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1320" cy="110" r="210" fill="#0f4fa8" fill-opacity="0.04"/>
  <circle cx="1180" cy="250" r="130" fill="#0f4fa8" fill-opacity="0.05"/>
</svg>
